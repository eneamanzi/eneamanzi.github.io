# Usato da jekyll-scholar/al-folio per linkare il nome di un coautore, nelle
# voci di _bibliography/papers.bib, a un suo profilo. Chiave = cognome
# dell'autore in minuscolo e senza accenti (come compare nel campo `author`
# del BibTeX, es. "Anisetti" -> "anisetti").
#
# Esempio di riferimento (commentato, non attivo) - tutti i parametri
# possibili per una voce:
# "cognome":
#   - firstname: ["Nome", "N.", "Nome Completo"] # varianti di nome accettate (match "contains" contro il campo author)
#     url: https://esempio.com/profilo-coautore

"anisetti":
  - firstname: ["Marco", "M."]
    url: https://anisetti.di.unimi.it/
